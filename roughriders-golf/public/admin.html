<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Admin — Rough Riders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark: #1a3320; --green-mid: #2d5a3d; --green-light: #4a8c62;
  --green-pale: #d4e8d8; --gold: #c9a84c; --gold-light: #f0d48a;
  --bg: #f4f6f4; --white: #ffffff;
  --text-dark: #1a1a18; --text-mid: #4a4a45; --text-light: #7a7a72;
  --border: rgba(0,0,0,0.08); --red: #c0392b; --red-pale: #fdf0ef;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
html { font-size: 15px; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-dark); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--green-dark);
}
.login-card { background: var(--white); border-radius: 8px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
.login-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--green-dark); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text-light); margin-bottom: 28px; }
.login-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.login-field label { font-size: 11.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-mid); }
.login-field input { padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
.login-field input:focus { border-color: var(--green-light); box-shadow: 0 0 0 3px rgba(74,140,98,0.1); }
.login-btn { width: 100%; padding: 12px; border: none; border-radius: 4px; background: var(--green-dark); color: var(--white); font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: background 0.18s; }
.login-btn:hover { background: var(--green-mid); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { font-size: 12.5px; color: var(--red); background: var(--red-pale); border-radius: 4px; padding: 8px 12px; margin-bottom: 12px; display: none; }

/* ── APP SHELL ── */
#app { display: none; min-height: 100vh; }
.topbar { background: var(--green-dark); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.topbar-brand { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: var(--white); }
.topbar-brand span { color: var(--gold); }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-user { font-size: 12px; color: rgba(255,255,255,0.55); }
.topbar-logout { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); cursor: pointer; font-size: 12px; padding: 5px 12px; border-radius: 3px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.topbar-logout:hover { border-color: rgba(255,255,255,0.5); color: var(--white); }

.app-body { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

/* ── TABS ── */
.tab-nav { display: flex; gap: 2px; background: var(--white); border-radius: 6px; padding: 4px; box-shadow: var(--shadow); margin-bottom: 28px; width: fit-content; }
.tab-btn { padding: 8px 20px; border: none; border-radius: 4px; background: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-light); transition: all 0.15s; }
.tab-btn.active { background: var(--green-dark); color: var(--white); }

/* ── STATS STRIP ── */
.stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
.stat-card { background: var(--white); border-radius: 6px; padding: 18px 20px; box-shadow: var(--shadow); border-left: 4px solid var(--green-light); }
.stat-card.gold-border { border-left-color: var(--gold); }
.stat-card.dark-border { border-left-color: var(--green-dark); }
.stat-val { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; color: var(--green-dark); line-height: 1; }
.stat-val.gold { color: var(--gold); }
.stat-lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light); margin-top: 4px; }

/* ── TOOLBAR ── */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.search-input { padding: 9px 14px; border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; width: 240px; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--green-light); }
.filter-select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; background: var(--white); cursor: pointer; }
.btn-refresh { padding: 9px 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--white); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.btn-refresh:hover { border-color: var(--green-light); color: var(--green-dark); }
.btn-export { padding: 9px 16px; border: none; border-radius: 4px; background: var(--green-dark); color: var(--white); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; margin-left: auto; }
.btn-export:hover { background: var(--green-mid); }

/* ── TABLE ── */
.table-wrap { background: var(--white); border-radius: 6px; box-shadow: var(--shadow); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead { background: #f9fafb; }
th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 13px 16px; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9fafe; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.badge-complete { background: #d4edda; color: #1a5c2a; }
.badge-open { background: #fff3cd; color: #856404; }
.badge-title  { background: #d4e8d8; color: var(--green-dark); }
.badge-gold   { background: #faeeda; color: #633806; }
.badge-silver { background: #e8e9ea; color: #3a3b3c; }
.badge-bronze { background: #f8e5d4; color: #7a3010; }
.badge-alacarte { background: #e8f0fe; color: #1a4a9e; }

.expand-btn { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 16px; padding: 0; transition: transform 0.2s, color 0.15s; }
.expand-btn:hover { color: var(--green-dark); }
.expand-btn.open { transform: rotate(90deg); }

.detail-row td { background: #fafbfa; padding: 16px 20px 16px 40px; }
.detail-row { display: none; }
.detail-row.open { display: table-row; }

.golfer-list { display: flex; flex-direction: column; gap: 8px; }
.golfer-item { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 12.5px; }
.golfer-item-name { font-weight: 600; color: var(--text-dark); min-width: 140px; }
.golfer-item-detail { color: var(--text-mid); }
.golfer-item-badge { font-size: 11px; background: var(--green-pale); color: var(--green-dark); padding: 1px 7px; border-radius: 3px; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── LOADING ── */
.loading-row td { text-align: center; padding: 40px; color: var(--text-light); font-size: 13px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.1); border-top-color: var(--green-light); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── GOLFERS TAB ── */
.golfer-full-card { background: var(--white); border-radius: 6px; padding: 18px; box-shadow: var(--shadow); display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.golfer-full-card .gfc-name { font-weight: 600; font-size: 15px; min-width: 180px; }
.gfc-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex: 1; }
.gfc-chip { font-size: 12px; background: #f1f3f4; border-radius: 3px; padding: 3px 9px; color: var(--text-mid); }

@media (max-width: 700px) {
  .app-body { padding: 16px 14px 40px; }
  .stats-strip { grid-template-columns: 1fr 1fr; }
  th:nth-child(n+4), td:nth-child(n+4) { display: none; }
}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">⛳ Rough Riders</div>
    <div class="login-sub">Golf Tournament Admin</div>
    <div class="login-error" id="login-error"></div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">⛳ Rough Riders <span>Admin</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="topbar-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="app-body">

    <!-- Stats -->
    <div class="stats-strip" id="stats-strip">
      <div class="stat-card gold-border">
        <div class="stat-val gold" id="stat-revenue">—</div>
        <div class="stat-lbl">Total Revenue</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-orders">—</div>
        <div class="stat-lbl">Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-golfers">—</div>
        <div class="stat-lbl">Golfers Registered</div>
      </div>
      <div class="stat-card dark-border">
        <div class="stat-val" id="stat-completed">—</div>
        <div class="stat-lbl">Payments Complete</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="showTab('orders')">Orders</button>
      <button class="tab-btn"        onclick="showTab('golfers')">Golfers</button>
      <button class="tab-btn"        onclick="showTab('sponsors')">Sponsors</button>
    </div>

    <!-- ── ORDERS TAB ── -->
    <div id="tab-orders">
      <div class="toolbar">
        <input class="search-input" id="order-search" placeholder="Search name, email…" oninput="renderOrders()">
        <select class="filter-select" id="order-filter" onchange="renderOrders()">
          <option value="">All statuses</option>
          <option value="COMPLETED">Completed</option>
          <option value="OPEN">Open / Pending</option>
        </select>
        <button class="btn-refresh" onclick="loadData()"><span id="refresh-spinner" style="display:none" class="spinner"></span>↻ Refresh</button>
        <button class="btn-export" onclick="exportCSV('orders')">↓ Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:28px;"></th>
            <th>Contact</th>
            <th>Sponsorships</th>
            <th>Golfers</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
          </tr></thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ── GOLFERS TAB ── -->
    <div id="tab-golfers" style="display:none;">
      <div class="toolbar">
        <input class="search-input" id="golfer-search" placeholder="Search name, company…" oninput="renderGolfers()">
        <button class="btn-export" onclick="exportCSV('golfers')" style="margin-left:auto;">↓ Export CSV</button>
      </div>
      <div id="golfers-list"></div>
    </div>

    <!-- ── SPONSORS TAB ── -->
    <div id="tab-sponsors" style="display:none;">
      <div class="toolbar">
        <button class="btn-export" onclick="exportCSV('sponsors')" style="margin-left:auto;">↓ Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Sponsor / Contact</th>
            <th>Packages</th>
            <th>Total Paid</th>
            <th>Status</th>
            <th>Date</th>
          </tr></thead>
          <tbody id="sponsors-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ════════════════════════════════
// CONFIG
// ════════════════════════════════
const NETLIFY_BASE = 'https://YOUR-SITE.netlify.app';

// ════════════════════════════════
// AUTH
// ════════════════════════════════
let adminToken = localStorage.getItem('rr_admin_token') || null;
let adminEmail = localStorage.getItem('rr_admin_email') || null;

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent='Please enter email and password.'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res = await fetch(`${NETLIFY_BASE}/.netlify/functions/admin-auth`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    adminToken = data.token; adminEmail = data.email;
    localStorage.setItem('rr_admin_token', adminToken);
    localStorage.setItem('rr_admin_email', adminEmail);
    showApp();
  } catch (err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doLogout() {
  adminToken = null; adminEmail = null;
  localStorage.removeItem('rr_admin_token'); localStorage.removeItem('rr_admin_email');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-user').textContent = adminEmail;
  loadData();
}

// Auto-login if token exists
if (adminToken) showApp();

// ════════════════════════════════
// DATA
// ════════════════════════════════
let allOrders = [];

async function loadData() {
  const spinner = document.getElementById('refresh-spinner');
  spinner.style.display = 'inline-block';
  setLoadingState();
  try {
    const res = await fetch(`${NETLIFY_BASE}/.netlify/functions/get-orders`, {
      headers: { 'Authorization': `Bearer ${adminToken}` },
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allOrders = data.orders || [];
    updateStats(data.stats || {});
    renderOrders();
    renderGolfers();
    renderSponsors();
  } catch (err) {
    showError('Failed to load data: ' + err.message);
  } finally {
    spinner.style.display = 'none';
  }
}

function setLoadingState() {
  document.getElementById('orders-tbody').innerHTML = `<tr class="loading-row"><td colspan="7"><span class="spinner"></span>Loading orders from Square…</td></tr>`;
}

function showError(msg) {
  document.getElementById('orders-tbody').innerHTML = `<tr class="loading-row"><td colspan="7" style="color:var(--red)">${msg}</td></tr>`;
}

function updateStats(s) {
  document.getElementById('stat-revenue').textContent   = '$' + (s.totalRevenue||0).toLocaleString('en-US');
  document.getElementById('stat-orders').textContent    = s.totalOrders||0;
  document.getElementById('stat-golfers').textContent   = s.totalGolfers||0;
  document.getElementById('stat-completed').textContent = s.completedOrders||0;
}

const fmt  = n => '$' + Number(n).toLocaleString('en-US');
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';

function sponsorBadge(name) {
  const n = name.toLowerCase();
  if (n.includes('title'))  return `<span class="badge badge-title">Title</span>`;
  if (n.includes('gold'))   return `<span class="badge badge-gold">Gold</span>`;
  if (n.includes('silver')) return `<span class="badge badge-silver">Silver</span>`;
  if (n.includes('bronze')) return `<span class="badge badge-bronze">Bronze</span>`;
  return `<span class="badge badge-alacarte">${name}</span>`;
}

// ════════════════════════════════
// ORDERS TAB
// ════════════════════════════════
function renderOrders() {
  const q = document.getElementById('order-search').value.toLowerCase();
  const f = document.getElementById('order-filter').value;
  const filtered = allOrders.filter(o => {
    const matchQ = !q || o.primaryContact.toLowerCase().includes(q) ||
      o.golfers.some(g => g.name.toLowerCase().includes(q));
    const matchF = !f || o.state === f;
    return matchQ && matchF;
  });

  if (!filtered.length) {
    document.getElementById('orders-tbody').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-light)">No orders found</td></tr>`;
    return;
  }

  document.getElementById('orders-tbody').innerHTML = filtered.map((o, i) => `
    <tr>
      <td><button class="expand-btn" id="exp-${i}" onclick="toggleDetail(${i})">▶</button></td>
      <td><strong>${o.primaryContact.split('<')[0].trim()}</strong><br><span style="font-size:12px;color:var(--text-light)">${o.orderId.slice(-8)}</span></td>
      <td>${o.sponsorships.length ? o.sponsorships.map(s=>sponsorBadge(s.name)).join(' ') : '<span style="color:var(--text-light);font-size:12px">None</span>'}</td>
      <td>${o.golferCount}</td>
      <td><strong>${fmt(o.total)}</strong></td>
      <td><span class="badge ${o.state==='COMPLETED'?'badge-complete':'badge-open'}">${o.state==='COMPLETED'?'Paid':'Pending'}</span></td>
      <td>${fmtDate(o.createdAt)}</td>
    </tr>
    <tr class="detail-row" id="detail-${i}">
      <td colspan="7">
        <div class="golfer-list">
          ${o.golfers.length ? o.golfers.map(g => `
            <div class="golfer-item">
              <span class="golfer-item-name">${g.name}</span>
              ${g.company ? `<span class="golfer-item-detail">🏢 ${g.company}</span>` : ''}
              ${g.phone   ? `<span class="golfer-item-detail">📞 ${g.phone}</span>` : ''}
              ${g.shirt   ? `<span class="golfer-item-badge">👕 ${g.shirt}</span>` : ''}
              ${g.handicap? `<span class="golfer-item-badge">HCP ${g.handicap}</span>` : ''}
            </div>`).join('') : '<div style="color:var(--text-light);font-size:13px">No golfer details</div>'}
        </div>
      </td>
    </tr>
  `).join('');
}

function toggleDetail(i) {
  const row = document.getElementById(`detail-${i}`);
  const btn = document.getElementById(`exp-${i}`);
  row.classList.toggle('open');
  btn.classList.toggle('open');
}

// ════════════════════════════════
// GOLFERS TAB
// ════════════════════════════════
function renderGolfers() {
  const q = document.getElementById('golfer-search')?.value.toLowerCase() || '';
  const all = allOrders.flatMap(o => o.golfers.map(g => ({ ...g, orderId: o.orderId, orderDate: o.createdAt, orderState: o.state })));
  const filtered = all.filter(g => !q || g.name.toLowerCase().includes(q) || (g.company||'').toLowerCase().includes(q));

  if (!filtered.length) {
    document.getElementById('golfers-list').innerHTML = `<div class="empty-state"><div class="empty-icon">🏌️</div><p>No golfers found</p></div>`;
    return;
  }

  document.getElementById('golfers-list').innerHTML = filtered.map(g => `
    <div class="golfer-full-card">
      <div class="gfc-name">${g.name}</div>
      <div class="gfc-meta">
        ${g.company  ? `<span class="gfc-chip">🏢 ${g.company}</span>` : ''}
        ${g.phone    ? `<span class="gfc-chip">📞 ${g.phone}</span>` : ''}
        ${g.shirt    ? `<span class="gfc-chip">👕 ${g.shirt}</span>` : ''}
        ${g.handicap ? `<span class="gfc-chip">HCP ${g.handicap}</span>` : ''}
        <span class="gfc-chip" style="margin-left:auto;font-size:11px;color:var(--text-light)">${fmtDate(g.orderDate)}</span>
        <span class="badge ${g.orderState==='COMPLETED'?'badge-complete':'badge-open'}">${g.orderState==='COMPLETED'?'Paid':'Pending'}</span>
      </div>
    </div>
  `).join('');
}

// ════════════════════════════════
// SPONSORS TAB
// ════════════════════════════════
function renderSponsors() {
  const withSponsors = allOrders.filter(o => o.sponsorships.length > 0);
  if (!withSponsors.length) {
    document.getElementById('sponsors-tbody').innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-light)">No sponsorships yet</td></tr>`;
    return;
  }
  document.getElementById('sponsors-tbody').innerHTML = withSponsors.map(o => `
    <tr>
      <td><strong>${o.primaryContact.split('<')[0].trim()}</strong><br>
        <span style="font-size:12px;color:var(--text-light)">${(o.primaryContact.match(/<(.+)>/) || [])[1] || ''}</span>
      </td>
      <td>${o.sponsorships.map(s=>sponsorBadge(s.name)).join(' ')}</td>
      <td><strong>${fmt(o.total)}</strong></td>
      <td><span class="badge ${o.state==='COMPLETED'?'badge-complete':'badge-open'}">${o.state==='COMPLETED'?'Paid':'Pending'}</span></td>
      <td>${fmtDate(o.createdAt)}</td>
    </tr>
  `).join('');
}

// ════════════════════════════════
// TABS
// ════════════════════════════════
function showTab(name) {
  ['orders','golfers','sponsors'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['orders','golfers','sponsors'][i] === name);
  });
}

// ════════════════════════════════
// CSV EXPORT
// ════════════════════════════════
function exportCSV(type) {
  let rows, filename;
  if (type === 'orders') {
    rows = [['Order ID','Contact','Sponsorships','Golfer Count','Total','Status','Date']];
    allOrders.forEach(o => rows.push([
      o.orderId, o.primaryContact,
      o.sponsorships.map(s=>s.name).join('; '),
      o.golferCount, o.total, o.state, fmtDate(o.createdAt)
    ]));
    filename = 'rr-golf-orders.csv';
  } else if (type === 'golfers') {
    rows = [['Name','Company','Phone','Shirt','Handicap','Order Date','Status']];
    allOrders.flatMap(o => o.golfers.map(g => rows.push([
      g.name, g.company||'', g.phone||'', g.shirt||'', g.handicap||'',
      fmtDate(o.createdAt), o.state
    ])));
    filename = 'rr-golf-golfers.csv';
  } else {
    rows = [['Contact','Sponsorships','Total','Status','Date']];
    allOrders.filter(o=>o.sponsorships.length).forEach(o => rows.push([
      o.primaryContact.split('<')[0].trim(),
      o.sponsorships.map(s=>s.name).join('; '),
      o.total, o.state, fmtDate(o.createdAt)
    ]));
    filename = 'rr-golf-sponsors.csv';
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
</script>
