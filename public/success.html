<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Confirmed — Rough Riders Golf</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #1a3320; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 10px; padding: 56px 48px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; color: #1a3320; margin-bottom: 12px; }
p { font-size: 15px; color: #4a4a45; line-height: 1.6; margin-bottom: 24px; }
.btn { display: inline-block; padding: 12px 28px; background: #1a3320; color: #fff; border-radius: 4px; text-decoration: none; font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; transition: background 0.18s; }
.btn:hover { background: #2d5a3d; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🏌️</div>
  <h1>You're on the course!</h1>
  <p>Your registration and sponsorship are confirmed. Check your email for a receipt from Square. We'll be in touch with all event details.</p>
  <p style="font-size:13px;color:#7a7a72;">See you on the green!</p>
  <a href="https://tamparoughriders.org" class="btn">Back to Rough Riders →</a>
</div>
</body>
</html>
